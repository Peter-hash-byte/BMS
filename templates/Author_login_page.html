{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Authority Login | Kivulini Hotel</title>
    
    <!-- Tailwind CSS -->
    {% tailwind_css %}

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <!-- Fontawesome -->
    <link rel="stylesheet" href="{%static 'Allfiles/Css/fontawesome.min.css'%}">
</head>

<body class="font-sans antialiased bg-gray-900">
    <section class="min-h-screen relative flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 overflow-hidden">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-emerald-950/80 backdrop-blur-sm"></div>
            <img src="{%static 'Allfiles/Photo/slider-5.jpg'%}" class="w-full h-full object-cover" alt="Background">
        </div>

        <div class="relative z-10 max-w-md w-full space-y-8 bg-white/10 backdrop-blur-md p-10 rounded-2xl border border-white/20 shadow-2xl">
            <!-- Header -->
            <div class="text-center">
                <a href="{% url 'Home' %}" class="inline-flex items-center text-emerald-400 hover:text-white transition-colors text-xs font-black uppercase tracking-[0.3em] mb-8 group">
                    <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> Back to Home
                </a>
                <div class="flex flex-col mb-2">
                    <h1 class="text-4xl font-bold text-white italic leading-none tracking-tighter">Kivulini</h1>
                    <span class="text-[10px] text-emerald-400 font-bold uppercase tracking-[0.5em] ml-1">Hotel & Resort</span>
                </div>
                <h2 class="mt-6 text-xl font-black text-white uppercase tracking-tight">Authority Access</h2>
                <p class="mt-2 text-sm text-gray-300">Please enter your credentials to manage the property.</p>
            </div>

            <!-- Form -->
            <form class="mt-8 space-y-6" method="POST" action="">
                {% csrf_token %}
                <div class="space-y-4">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500 group-focus-within:text-emerald-400 transition-colors">
                            <i class="fas fa-envelope text-sm"></i>
                        </div>
                        <input type="email" name="Email" required 
                               class="block w-full pl-11 pr-4 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-400 transition-all text-sm" 
                               placeholder="Email address">
                    </div>
                    <div class="relative group" x-data="{ show: false }">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500 group-focus-within:text-emerald-400 transition-colors">
                            <i class="fas fa-lock text-sm"></i>
                        </div>
                        <input :type="show ? 'text' : 'password'" name="Password" required 
                               class="block w-full pl-11 pr-12 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-400 transition-all text-sm" 
                               placeholder="Password">
                        <button type="button" @click="show = !show" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-white transition-colors">
                            <i class="fas" :class="show ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                               class="h-4 w-4 text-emerald-500 focus:ring-emerald-500 border-white/10 rounded bg-white/5 cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-xs text-gray-300 cursor-pointer hover:text-gray-200 transition-colors">
                            Keep me logged in
                        </label>
                    </div>

                    <div class="text-xs">
                        <a href="{% url 'Author_ForgotPass' %}" class="font-bold text-emerald-400 hover:text-emerald-300 transition-colors uppercase tracking-widest">
                            Forgot password?
                        </a>
                    </div>
                </div>

                <div>
                    <button type="submit" 
                            class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-black rounded-xl text-slate-900 bg-emerald-400 hover:bg-emerald-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-all shadow-lg uppercase tracking-[0.2em]">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="text-center pt-4">
                <p class="text-xs text-gray-400 uppercase tracking-widest">
                    Need an account? 
                    <a href="{% url 'Author_Reg' %}" class="font-black text-white hover:text-emerald-400 transition-colors ml-2">Register Now</a>
                </p>
            </div>
        </div>
    </section>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
