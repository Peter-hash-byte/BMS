{% extends 'admin/AdminAllinclude.html' %}
{% block title %}Account Settings{% endblock %}
{% block pagecontant %}

<div class="max-w-2xl mx-auto space-y-8">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 uppercase tracking-tight">Account Settings</h1>
            <p class="text-sm text-gray-500 uppercase tracking-widest mt-1">Manage your administrative profile</p>
        </div>
        <a href="{% url 'UserProfile' %}" class="text-xs font-black uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors">
            <i class="fa fa-arrow-left mr-2"></i> Back to Profile
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="px-8 py-6 border-b border-slate-50 bg-slate-50/50">
            <h2 class="font-black text-slate-900 uppercase tracking-tight text-xs">Update Information</h2>
        </div>
        <div class="p-8">
            <form method="POST" action="" class="space-y-6">
                {% csrf_token %}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="block text-[10px] font-black uppercase text-slate-500 ml-1">First Name</label>
                        <input type="text" name="Fname" value="{{ user.Fname }}" required
                               class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-5 py-3 focus:bg-white focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 outline-none transition-all text-sm font-bold">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[10px] font-black uppercase text-slate-500 ml-1">Last Name</label>
                        <input type="text" name="Lname" value="{{ user.Lname }}" required
                               class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-5 py-3 focus:bg-white focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 outline-none transition-all text-sm font-bold">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-[10px] font-black uppercase text-slate-500 ml-1">Email Address (Read-only)</label>
                    <input type="email" value="{{ user.Email }}" disabled
                           class="w-full bg-slate-100 border-2 border-slate-100 rounded-xl px-5 py-3 text-slate-400 text-sm font-bold cursor-not-allowed">
                    <p class="text-[9px] text-slate-400 italic mt-1 ml-1">Contact system admin to change your registered email.</p>
                </div>

                <div class="space-y-1">
                    <label class="block text-[10px] font-black uppercase text-slate-500 ml-1">Phone Number</label>
                    <input type="text" name="Phone_Number" value="{{ user.Phone_Number }}" required
                           class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-5 py-3 focus:bg-white focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 outline-none transition-all text-sm font-bold">
                </div>

                <div class="pt-6 border-t border-slate-50 flex space-x-4">
                    <button type="submit" class="flex-grow bg-emerald-600 hover:bg-emerald-700 text-white font-black uppercase tracking-widest py-4 rounded-xl text-xs transition-all shadow-lg active:scale-[0.98]">
                        Save Changes
                    </button>
                    <button type="reset" class="px-8 border-2 border-slate-100 text-slate-400 hover:bg-slate-50 hover:text-slate-600 rounded-xl text-xs font-black uppercase tracking-widest transition-all">
                        Reset
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
