{% extends 'admin/AdminAllinclude.html' %}
{% block title %}Edit Employee Record{% endblock %}
{% block pagecontant %}

<div class="max-w-4xl mx-auto space-y-8">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 uppercase tracking-tight">Edit Employee</h1>
            <div class="flex items-center space-x-2 text-xs font-bold uppercase tracking-widest text-gray-400 mt-1">
                <a href="{% url 'Adminpage' %}" class="hover:text-amber-500 transition-colors">Home</a>
                <span>/</span>
                <a href="{% url 'Addemployee' %}" class="hover:text-amber-500 transition-colors">Employees</a>
                <span>/</span>
                <span class="text-gray-900">Edit Staff</span>
            </div>
        </div>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-50 bg-gray-50/50">
            <h2 class="font-bold text-gray-900 uppercase tracking-tight text-sm flex items-center">
                <i class="fa fa-user-cog mr-2 text-amber-500"></i> Employee Profile: {{ data.first_name }} {{ data.last_name }}
            </h2>
        </div>
        <div class="p-8">
            <form method="POST" action="" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- ID & Identity -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Employee ID</label>
                        <input type="text" name="employee_id" value="{{ data.employee_id }}" readonly 
                               class="w-full bg-gray-100 border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-500 cursor-not-allowed outline-none">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">National Identity (NID)</label>
                        <input type="text" name="id_number" value="{{ data.id_number }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <!-- Name -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">First Name</label>
                        <input type="text" name="first_name" value="{{ data.first_name }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Last Name</label>
                        <input type="text" name="last_name" value="{{ data.last_name }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <!-- Contact -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Work Email</label>
                        <input type="email" name="email" value="{{ data.email }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Mobile Number</label>
                        <input type="text" name="phone_number" value="{{ data.phone_number }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <!-- Dates -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Joining Date</label>
                        <input type="date" name="joining_date" value="{{ data.joining_date|date:'Y-m-d' }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Date of Birth</label>
                        <input type="date" name="date_of_birth" value="{{ data.date_of_birth|date:'Y-m-d' }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <!-- Dept & Gender -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Department</label>
                        <select name="department" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                            <option value="Housekeeping" {% if data.department == "Housekeeping" %}selected{% endif %}>Housekeeping</option>
                            <option value="Kitchen" {% if data.department == "Kitchen" %}selected{% endif %}>Kitchen</option>
                            <option value="Security" {% if data.department == "Security" %}selected{% endif %}>Security</option>
                            <option value="Manager" {% if data.department == "Manager" %}selected{% endif %}>Manager</option>
                            <option value="Chef" {% if data.department == "Chef" %}selected{% endif %}>Chef</option>
                            <option value="Food and Beverage" {% if data.department == "Food and Beverage" %}selected{% endif %}>Food and Beverage</option>
                            <option value="transport" {% if data.department == "transport" %}selected{% endif %}>Transport</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Gender</label>
                        <select name="gender" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                            <option value="MALE" {% if data.gender == "MALE" %}selected{% endif %}>MALE</option>
                            <option value="FEMALE" {% if data.gender == "FEMALE" %}selected{% endif %}>FEMALE</option>
                        </select>
                    </div>

                    <!-- Health & Education -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Blood Group</label>
                        <input type="text" name="blood_group" value="{{ data.blood_group }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Education</label>
                        <input type="text" name="education" value="{{ data.education }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <!-- Guardian -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Guardian Name</label>
                        <input type="text" name="guardian_name" value="{{ data.guardian_name }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Guardian Number</label>
                        <input type="text" name="guardian_phone" value="{{ data.guardian_phone }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <!-- Address & Image -->
                    <div class="space-y-1 md:col-span-2">
                        <label class="block text-xs font-bold uppercase text-gray-500">Current Address</label>
                        <input type="text" name="address" value="{{ data.address }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1 md:col-span-2">
                        <label class="block text-xs font-bold uppercase text-gray-500">Profile Image</label>
                        <div class="mt-2 flex items-center space-x-4">
                            {% if data.image %}
                            <img src="{{ data.image.url }}" class="w-16 h-16 rounded-lg object-cover border border-gray-200" alt="Current image">
                            {% endif %}
                            <input type="file" name="image" 
                                   class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-amber-100 file:text-amber-700 hover:file:bg-amber-200 cursor-pointer">
                        </div>
                    </div>
                </div>

                <div class="pt-8 flex flex-col sm:flex-row gap-4 border-t border-gray-100">
                    <button type="submit" class="flex-grow bg-emerald-500 hover:bg-emerald-600 text-white font-bold uppercase tracking-widest py-3 rounded-lg text-xs transition-all shadow-sm flex items-center justify-center">
                        <i class="fa fa-save mr-2"></i> Update Employee
                    </button>
                    <button type="reset" class="px-8 border border-gray-200 text-gray-400 hover:bg-gray-50 rounded-lg text-xs font-bold uppercase tracking-widest transition-all">
                        Reset
                    </button>
                    <a href="{% url 'Addemployee' %}" class="px-8 border border-gray-200 text-gray-600 hover:bg-gray-100 rounded-lg text-xs font-bold uppercase tracking-widest transition-all flex items-center justify-center">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
