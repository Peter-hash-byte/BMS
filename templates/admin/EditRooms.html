{% extends 'admin/AdminAllinclude.html' %}
{% block title %}Edit Room Details{% endblock %}
{% block pagecontant %}

<div class="max-w-4xl mx-auto space-y-8">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 uppercase tracking-tight">Edit Room</h1>
            <div class="flex items-center space-x-2 text-xs font-bold uppercase tracking-widest text-gray-400 mt-1">
                <a href="{% url 'Adminpage' %}" class="hover:text-amber-500 transition-colors">Home</a>
                <span>/</span>
                <a href="{% url 'Add_room' %}" class="hover:text-amber-500 transition-colors">Room Inventory</a>
                <span>/</span>
                <span class="text-gray-900">Edit Room</span>
            </div>
        </div>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-50 bg-gray-50/50">
            <h2 class="font-bold text-gray-900 uppercase tracking-tight text-sm flex items-center">
                <i class="fa fa-bed mr-2 text-amber-500"></i> Room Details: {{ data.room_number }}
            </h2>
        </div>
        <div class="p-8">
            <form method="POST" action="" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Room Identification -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Room Number</label>
                        <select name="room_number" class="w-full bg-gray-100 border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-500 cursor-not-allowed outline-none" readonly>
                            <option value="Room101" {% if data.room_number == "Room101" %}selected{% endif %}>Room 101</option>
                            <option value="Room102" {% if data.room_number == "Room102" %}selected{% endif %}>Room 102</option>
                            <option value="Room103" {% if data.room_number == "Room103" %}selected{% endif %}>Room 103</option>
                            <option value="Room104" {% if data.room_number == "Room104" %}selected{% endif %}>Room 104</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Room Type</label>
                        <select name="room_type" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                            <option value="Delux" {% if data.room_type == "Delux" %}selected{% endif %}>Delux</option>
                            <option value="Super Delux" {% if data.room_type == "Super Delux" %}selected{% endif %}>Super Delux</option>
                            <option value="Single" {% if data.room_type == "Single" %}selected{% endif %}>Single</option>
                            <option value="Double" {% if data.room_type == "Double" %}selected{% endif %}>Double</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Floor Assignment</label>
                        <select name="floor" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm" required>
                            <option value="Floor_G" {% if data.floor == "Floor_G" %}selected{% endif %}>Ground Floor</option>
                            <option value="Floor_First" {% if data.floor == "Floor_First" %}selected{% endif %}>First Floor</option>
                            <option value="Floor_Second" {% if data.floor == "Floor_Second" %}selected{% endif %}>Second Floor</option>
                            <option value="Floor_Thirt" {% if data.floor == "Floor_Thirt" %}selected{% endif %}>Third Floor</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Price Per Night ($)</label>
                        <input type="text" name="price" value="{{ data.price }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1 md:col-span-2">
                        <label class="block text-xs font-bold uppercase text-gray-500">Facilities & Amenities</label>
                        <input type="text" name="facility" value="{{ data.facility }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm" placeholder="e.g. WiFi, AC, Balcony, Mini-bar">
                    </div>

                    <div class="space-y-1 md:col-span-2">
                        <label class="block text-xs font-bold uppercase text-gray-500">Room Gallery Image</label>
                        <div class="mt-2 flex items-center space-x-4">
                            {% if data.image %}
                            <img src="{{ data.image.url }}" class="w-24 h-24 rounded-lg object-cover border border-gray-200 shadow-sm" alt="Current room image">
                            {% endif %}
                            <input type="file" name="image" 
                                   class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-amber-100 file:text-amber-700 hover:file:bg-amber-200 cursor-pointer">
                        </div>
                    </div>
                </div>

                <div class="pt-8 flex flex-col sm:flex-row gap-4 border-t border-gray-100">
                    <button type="submit" class="flex-grow bg-emerald-500 hover:bg-emerald-600 text-white font-bold uppercase tracking-widest py-3 rounded-lg text-xs transition-all shadow-sm flex items-center justify-center">
                        <i class="fa fa-save mr-2"></i> Update Room Details
                    </button>
                    <button type="reset" class="px-8 border border-gray-200 text-gray-400 hover:bg-gray-50 rounded-lg text-xs font-bold uppercase tracking-widest transition-all">
                        Reset
                    </button>
                    <a href="{% url 'Add_room' %}" class="px-8 border border-gray-200 text-gray-600 hover:bg-gray-100 rounded-lg text-xs font-bold uppercase tracking-widest transition-all flex items-center justify-center">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
