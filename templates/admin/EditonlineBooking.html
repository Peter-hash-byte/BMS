{% extends 'admin/AdminAllinclude.html' %}
{% block title %}Edit Online Booking{% endblock %}
{% block pagecontant %}

<div class="max-w-4xl mx-auto space-y-8">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 uppercase tracking-tight">Edit Online Booking</h1>
            <div class="flex items-center space-x-2 text-xs font-bold uppercase tracking-widest text-gray-400 mt-1">
                <a href="{% url 'Adminpage' %}" class="hover:text-amber-500 transition-colors">Home</a>
                <span>/</span>
                <a href="{% url 'online_Booking_info' %}" class="hover:text-amber-500 transition-colors">Online Bookings</a>
                <span>/</span>
                <span class="text-gray-900">Edit Booking</span>
            </div>
        </div>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-50 bg-gray-50/50">
            <h2 class="font-bold text-gray-900 uppercase tracking-tight text-sm flex items-center">
                <i class="fa fa-globe mr-2 text-amber-500"></i> Reservation: {{ data.first_name }} {{ data.last_name }}
            </h2>
        </div>
        <div class="p-8">
            <form method="POST" action="" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- ID & NID -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Booking ID</label>
                        <input type="text" name="id" value="{{ data.id }}" readonly 
                               class="w-full bg-gray-100 border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-500 cursor-not-allowed outline-none">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">NID / Identity Number</label>
                        <input type="text" name="id_number" value="{{ data.id_number }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <!-- Stay Dates -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Check In Date</label>
                        <input type="date" name="check_in" value="{{ data.check_in|date:'Y-m-d' }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Check Out Date</label>
                        <input type="date" name="check_out" value="{{ data.check_out|date:'Y-m-d' }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <!-- Occupancy -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Adults</label>
                        <select name="adults" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                            <option value="1" {% if data.adults == 1 %}selected{% endif %}>1 Adult</option>
                            <option value="2" {% if data.adults == 2 %}selected{% endif %}>2 Adults</option>
                            <option value="3" {% if data.adults == 3 %}selected{% endif %}>3 Adults</option>
                            <option value="4" {% if data.adults == 4 %}selected{% endif %}>4 Adults</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Children</label>
                        <select name="children" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                            <option value="0" {% if data.children == 0 %}selected{% endif %}>0 Children</option>
                            <option value="1" {% if data.children == 1 %}selected{% endif %}>1 Child</option>
                            <option value="2" {% if data.children == 2 %}selected{% endif %}>2 Children</option>
                            <option value="3" {% if data.children == 3 %}selected{% endif %}>3 Children</option>
                            <option value="4" {% if data.children == 4 %}selected{% endif %}>4 Children</option>
                        </select>
                    </div>

                    <!-- Guest Details -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">First Name</label>
                        <input type="text" name="first_name" value="{{ data.first_name }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Last Name</label>
                        <input type="text" name="last_name" value="{{ data.last_name }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Email Address</label>
                        <input type="email" name="email" value="{{ data.email }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Phone Number</label>
                        <input type="text" name="phone_number" value="{{ data.phone_number }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <!-- Location -->
                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">City</label>
                        <input type="text" name="city" value="{{ data.city }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold uppercase text-gray-500">Country</label>
                        <input type="text" name="country" value="{{ data.country }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>

                    <div class="space-y-1 md:col-span-2">
                        <label class="block text-xs font-bold uppercase text-gray-500">Full Address</label>
                        <input type="text" name="address" value="{{ data.address }}" 
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2.5 focus:bg-white focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none transition-all text-sm">
                    </div>
                </div>

                <div class="pt-8 flex flex-col sm:flex-row gap-4 border-t border-gray-100">
                    <button type="submit" class="flex-grow bg-emerald-500 hover:bg-emerald-600 text-white font-bold uppercase tracking-widest py-3 rounded-lg text-xs transition-all shadow-sm flex items-center justify-center">
                        <i class="fa fa-save mr-2"></i> Update Reservation
                    </button>
                    <button type="reset" class="px-8 border border-gray-200 text-gray-400 hover:bg-gray-50 rounded-lg text-xs font-bold uppercase tracking-widest transition-all">
                        Reset Form
                    </button>
                    <a href="{% url 'online_Booking_info' %}" class="px-8 border border-gray-200 text-gray-600 hover:bg-gray-100 rounded-lg text-xs font-bold uppercase tracking-widest transition-all flex items-center justify-center">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
