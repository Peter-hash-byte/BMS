{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register | Kivulini Hotel</title>
    
    <!-- Tailwind CSS -->
    {% tailwind_css %}

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <!-- Fontawesome -->
    <link rel="stylesheet" href="{%static 'Allfiles/Css/fontawesome.min.css'%}">
</head>

<body class="font-sans antialiased bg-gray-900">
    <section class="min-h-screen relative flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 overflow-hidden">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
            <img src="{%static 'Allfiles/Photo/slider-2.jpg'%}" class="w-full h-full object-cover" alt="Background">
        </div>

        <div class="relative z-10 max-w-xl w-full space-y-8 bg-white/10 backdrop-blur-md p-10 rounded-2xl border border-white/20 shadow-2xl">
            <!-- Header -->
            <div class="text-center">
                <a href="{% url 'Home' %}" class="inline-flex items-center text-amber-500 hover:text-white transition-colors text-xs font-black uppercase tracking-[0.3em] mb-8 group">
                    <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> Back to Home
                </a>
                <div class="flex flex-col mb-2">
                    <h1 class="text-4xl font-bold text-white italic leading-none tracking-tighter">Kivulini</h1>
                    <span class="text-[10px] text-amber-500 font-bold uppercase tracking-[0.5em] ml-1">Hotel & Resort</span>
                </div>
                <h2 class="mt-6 text-xl font-black text-white uppercase tracking-tight">Authority Registration</h2>
                <p class="mt-2 text-sm text-gray-400">Join our administrative team to manage property operations.</p>
            </div>

            <!-- Form -->
            <form class="mt-8 space-y-6" method="POST" action="">
                {% csrf_token %}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="relative group">
                        <input type="text" name="Fname" required 
                               class="block w-full px-4 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all text-sm" 
                               placeholder="First Name *">
                    </div>
                    <div class="relative group">
                        <input type="text" name="Lname" required 
                               class="block w-full px-4 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all text-sm" 
                               placeholder="Last Name *">
                    </div>
                    <div class="md:col-span-2 relative group">
                        <input type="email" name="Email" required 
                               class="block w-full px-4 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all text-sm" 
                               placeholder="Email address *">
                    </div>
                    <div class="md:col-span-2 relative group">
                        <select name="Role" required 
                               class="block w-full px-4 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all text-sm appearance-none cursor-pointer">
                            <option value="" disabled selected class="bg-gray-900">Select Your Role *</option>
                            <option value="Receptionist" class="bg-gray-900">Receptionist</option>
                            <option value="Housekeeper" class="bg-gray-900">Housekeeper</option>
                            <option value="Manager" class="bg-gray-900">Manager</option>
                            <option value="Administrator" class="bg-gray-900">Administrator</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 relative group">
                        <input type="text" name="Phone_Number" required 
                               class="block w-full px-4 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all text-sm" 
                               placeholder="Phone Number *">
                    </div>
                    <div class="relative group">
                        <input type="password" name="Password" required 
                               class="block w-full px-4 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all text-sm" 
                               placeholder="Password *">
                    </div>
                    <div class="relative group">
                        <input type="password" name="Con_password" required 
                               class="block w-full px-4 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all text-sm" 
                               placeholder="Confirm Password *">
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="terms" name="check" type="checkbox" required 
                           class="h-4 w-4 text-amber-500 focus:ring-amber-500 border-white/10 rounded bg-white/5 cursor-pointer">
                    <label for="terms" class="ml-2 block text-xs text-gray-400 cursor-pointer hover:text-gray-300 transition-colors italic">
                        I Agree to the Terms & Conditions and Privacy Policy
                    </label>
                </div>

                <div class="flex flex-col sm:flex-row gap-4">
                    <button type="submit" 
                            class="flex-grow flex justify-center py-4 px-4 border border-transparent text-sm font-black rounded-xl text-black bg-amber-500 hover:bg-amber-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 transition-all shadow-lg uppercase tracking-[0.2em]">
                        Register Now
                    </button>
                    <a href="{% url 'Author_login' %}" 
                       class="flex items-center justify-center py-4 px-8 border border-white/10 rounded-xl text-sm font-bold text-white hover:bg-white/5 transition-all uppercase tracking-widest">
                        Sign In
                    </a>
                </div>
            </form>
        </div>
    </section>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
